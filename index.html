<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script data-apex-redirect>
      (() => {
        const values = new URLSearchParams(window.location.search).getAll("lang");
        const language = values.length === 1 ? values[0] : "";
        const query = language === "es" ? "?lang=es" : language === "en" ? "?lang=en" : "";
        window.location.replace(`/fars/national/${query}`);
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=/fars/national/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>US evidence ledger — nearmiss</title>
    <link rel="canonical" href="https://nearmiss.report/fars/national/" />
  </head>
  <body>
    <!-- Apex landing for the GitHub Pages custom domain (nearmiss.report).
         Redirects to the national evidence ledger; the links are no-JS fallbacks. -->
    <main>
      <h1>US evidence ledger</h1>
      <p>
        Redirecting to the
        <a href="/fars/national/">US evidence ledger</a>…
        <a href="/fars/national/?lang=es" hreflang="es" lang="es">Español</a> ·
        <a href="/web/index.html">Davis near-miss demo</a>. The
        <a href="/data/published/fars-state-mode-index-v2.json">national evidence release index</a>,
        <a href="/data/published/fars-2024-state-mode-r2.json">2024 evidence JSON</a>,
        <a href="/data/published/fars-release-corrections.json">release correction ledger</a>, and
        <a href="https://github.com/ChelseaKR/nearmiss">source code</a> are public.
      </p>
    </main>
  </body>
</html>
