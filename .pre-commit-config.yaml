# Pre-commit hooks for nearmiss.
#   Install:  pre-commit install && pre-commit install --hook-type commit-msg
# These run the same tools the CI gate runs, so problems are caught before they
# reach a pull request. Wired to match pyproject.toml and the CI security job.
minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # Ruff — lint + format (configured in pyproject.toml [tool.ruff]).
  # Pinned to the same ruff the CI `lint` job installs from ".[dev]" (ruff>=0.4
  # resolves to 0.15.x); keep this rev in step with the ruff `make lint` runs.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # mypy — strict typing (configured in pyproject.toml [tool.mypy]).
  # Run the PROJECT-INSTALLED mypy through `make type` (a local system hook)
  # rather than pre-commit's isolated mirror. The mirror ran with
  # additional_dependencies: [] and passed file arguments, so it (a) could not
  # see pytest/jsonschema/babel and emitted false "untyped decorator" positives
  # on the test suite, and (b) type-checked tools/ — outside the pyproject
  # `files = ["src", "tests"]` scope that `make type` (and the CI `type` job)
  # enforce. Both forced contributors onto `git commit --no-verify`. Shelling out
  # to the same `make type` target makes local == CI by construction: identical
  # mypy version, identical [tool.mypy] strict config, identical dependency
  # stubs, identical file scope. (.venv is the repo's documented dev interpreter
  # — see the Makefile PYTHON override note and .gitignore.)
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (make type)
        entry: make type PYTHON=.venv/bin/python
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true

  # gitleaks — backstop against committing secrets or precise raw report data.
  # This is a safety net, not permission to be careless (see CONTRIBUTING.md).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Vendored third-party assets (web/vendor/) are kept byte-for-byte as
      # upstream ships them — the minified leaflet.js has no trailing newline by
      # design — so the whitespace/EOF fixers must not rewrite them (doing so
      # only produced a spurious diff that forced `git commit --no-verify`).
      - id: trailing-whitespace
        exclude: ^web/vendor/
      - id: end-of-file-fixer
        exclude: ^web/vendor/
      # CloudFormation intrinsic tags (`!Ref`, `!Sub`, `!GetAtt`, `!Equals`)
      # are intentionally outside PyYAML's generic schema. AWS validates that
      # template before stack updates; the build tests enforce its fail-closed
      # hosting contract.
      - id: check-yaml
        exclude: ^infra/aws-static-site\.yml$
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]

  # Conventional Commits — enforce the commit-message format on the commit-msg hook.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Local guard: block anything under data/raw/ from ever being committed (HR4).
  - repo: local
    hooks:
      - id: block-raw-reports
        name: block precise raw reports (data/raw/)
        entry: "data/raw/ holds private precise reports and must never be committed (see CONTRIBUTING.md)"
        language: fail
        files: ^data/raw/
