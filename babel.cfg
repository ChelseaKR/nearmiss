# Babel message-extraction config (INTERNATIONALIZATION-STANDARD §3/§4).
#
# nearmiss's only end-user-facing, natural-language surface is the advocacy
# brief (nearmiss.brief + the label helpers in nearmiss.i18n). Every such string
# is wrapped in gettext _()/ngettext(); this config tells `pybabel extract` to
# scan the package's Python sources for those calls. Operator output (the CLI,
# the read-only server's HTTP/JSON bodies, moderation text, and the structured
# JSON logs in nearmiss.obs) is English-only by design and carries no _() calls,
# so nothing is extracted from it.
[python: **.py]
