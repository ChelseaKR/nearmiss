name: "Road hazard / near-miss report · Reporte de peligro vial / cuasi-accidente"
description: "Report a close pass, door-zone, blind-corner, surface, signal, or debris hazard you experienced. · Reporte una pasada cercana, zona de puertas, esquina ciega, superficie, señal o escombros."
title: "[hazard]: <hazard type> near <general location>"
labels:
  - "hazard-report"
  - "needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        ## Privacy first · Privacidad primero

        > **⚠️ This issue is PUBLIC.** Anything you type here is visible to everyone, forever.
        > **Do not include** your name, anyone else's name, license plates, faces, contact details,
        > or an exact home address. Describe **where the hazard is**, not **where you live** — use a
        > corner, block, or landmark (for example, "northbound bike lane on 3rd St at the B St
        > crossing"). Precise coordinates are only ever accepted privately at intake.
        >
        > **⚠️ Este issue es PÚBLICO.** Todo lo que escriba aquí es visible para cualquiera, para
        > siempre. **No incluya** su nombre, el nombre de otras personas, placas de matrícula, rostros,
        > datos de contacto ni una dirección exacta de su domicilio. Describa **dónde está el peligro**,
        > no **dónde vive** — use una esquina, cuadra o punto de referencia (por ejemplo, "carril bici
        > en dirección norte en la calle 3 al cruce con la calle B"). Las coordenadas precisas solo se
        > aceptan de forma privada en el intake.

        nearmiss is a **community-owned evidence base for safe-streets advocacy**, not a city 311 queue
        or a public-works complaint inbox. Reports here become part of an **open, aggregated dataset**.
        If you need to share a vulnerability or a privacy problem, do not use this form — see
        [`SECURITY.md`](../blob/main/SECURITY.md) instead.

        nearmiss es una **base de evidencia de la comunidad para la defensa de calles seguras**, no una
        cola del 311 ni un buzón de quejas de obras públicas. Los reportes aquí pasan a formar parte de
        un **conjunto de datos abierto y agregado**. Si necesita reportar una vulnerabilidad o un
        problema de privacidad, no use este formulario — vea [`SECURITY.md`](../blob/main/SECURITY.md).
  - type: checkboxes
    id: privacy-ack
    attributes:
      label: "Privacy acknowledgement · Confirmación de privacidad"
      description: "Please confirm before submitting. · Por favor confirme antes de enviar."
      options:
        - label: "This report contains no names, plates, contact details, home address, or exact coordinates of where I live. · Este reporte no contiene nombres, placas, datos de contacto, dirección de domicilio ni coordenadas exactas de dónde vivo."
          required: true
  - type: input
    id: location
    attributes:
      label: "Location or address (general, not your home) · Ubicación o dirección (general, no su domicilio)"
      description: >-
        A street, intersection, block, or landmark coarse enough that it does not reveal your
        routine. Do not paste exact GPS coordinates here. · Una calle, intersección, cuadra o punto de
        referencia lo bastante general para no revelar su rutina. No pegue coordenadas GPS exactas.
      placeholder: "Northbound bike lane on Russell Blvd at the Sycamore Ln crossing"
    validations:
      required: true
  - type: input
    id: occurred-at
    attributes:
      label: "Date and approximate time it happened · Fecha y hora aproximada en que ocurrió"
      description: >-
        When the hazard occurred (event time, not when you are filing this). Round the time if it
        helps protect your routine. · Cuándo ocurrió el peligro (la hora del evento, no la de este
        reporte). Redondee la hora si ayuda a proteger su rutina.
      placeholder: "2026-06-15, around 08:40 in the morning · 2026-06-15, alrededor de las 08:40"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: "How were you travelling? · ¿Cómo se desplazaba?"
      description: "Your travel mode when the hazard happened. · Su modo de transporte cuando ocurrió el peligro."
      options:
        - "Cyclist · Ciclista"
        - "Pedestrian · Peatón"
        - "Wheelchair user · Usuario de silla de ruedas"
        - "Scooter · Patinete / scooter"
        - "Other (describe in the note) · Otro (descríbalo en la nota)"
    validations:
      required: true
  - type: dropdown
    id: hazard-type
    attributes:
      label: "Hazard type · Tipo de peligro"
      description: >-
        The category that best fits. · La categoría que mejor corresponda. Close pass / Pasada cercana
        = a motor vehicle passing too closely; Dooring / Zona de puertas = the door-zone conflict;
        Surface / Superficie = potholes or broken pavement; Sightline / Visibilidad = a blind corner;
        Signal / Señal = a signal-timing or signal-conflict hazard; Debris / Escombros = loose material.
      options:
        - "Close pass (vehicle passed too closely) · Pasada cercana (un vehículo pasó demasiado cerca)"
        - "Dooring / door-zone conflict · Zona de puertas (conflicto con una puerta que se abre)"
        - "Surface hazard (pothole, broken pavement) · Superficie (bache, pavimento roto)"
        - "Sightline (blind corner, obstructed visibility) · Visibilidad (esquina ciega, visión obstruida)"
        - "Signal (timing or conflict) · Señal (sincronización o conflicto)"
        - "Debris in the path · Escombros en la vía"
        - "Other (describe in the note) · Otro (descríbalo en la nota)"
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: "Severity (your own assessment) · Gravedad (su propia evaluación)"
      description: >-
        Your assessment of the outcome, not a clinical or police classification. We record it as a
        contributor's judgement, never as a verified injury statistic. · Su evaluación del resultado,
        no una clasificación clínica o policial. Lo registramos como un juicio de quien reporta, nunca
        como una estadística de lesiones verificada.
      options:
        - "Near miss (avoided, no contact or injury) · Cuasi-accidente (evitado, sin contacto ni lesión)"
        - "Minor (contact or a fall, minor or no lasting injury) · Leve (contacto o caída, lesión leve o ninguna)"
        - "Serious (a crash with significant injury) · Grave (un choque con lesión significativa)"
    validations:
      required: true
  - type: textarea
    id: note
    attributes:
      label: "What happened (optional) · Qué pasó (opcional)"
      description: >-
        A short description of the conditions and what made it hazardous; keep it under a few
        sentences. Reminder: no names, no plates, no contact details, nothing that reveals your home
        or routine. · Una descripción breve de las condiciones y qué lo hizo peligroso; manténgala en
        pocas frases. Recuerde: sin nombres, sin placas, sin datos de contacto, nada que revele su
        domicilio o rutina.
      placeholder: "Parked SUV in the bike lane forced a merge into through traffic with no sightline behind."
    validations:
      required: false
  - type: dropdown
    id: language
    attributes:
      label: "Language of this report (optional) · Idioma de este reporte (opcional)"
      description: >-
        The language you wrote the note in, so the dataset can describe language-based
        under-representation. · El idioma en que escribió la nota, para que el conjunto de datos pueda
        describir la sub-representación por idioma.
      options:
        - "English · Inglés (en)"
        - "Spanish · Español (es)"
        - "Other · Otro"
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ---

        ### What happens next · Qué pasa después

        Your report is triaged into the **private intake**, validated against the published schema, and
        only ever published as an **aggregated, low-count-withheld segment statistic** — never as your
        precise location, time, or note. A single report is a **data point, not a danger ranking**:
        nearmiss only publishes risk as a rate with a denominator, a confidence interval, and a stated
        bias caveat, never a raw count labelled "dangerous." **This does NOT dispatch a city crew** — for
        an urgent road problem, also call your city (for example 311). Thank you for contributing carefully.

        Su reporte se clasifica en el **intake privado**, se valida contra el esquema publicado, y solo
        se publica como una **estadística por segmento, agregada y con los conteos bajos omitidos** —
        nunca como su ubicación, hora o nota precisas. Un solo reporte es un **dato, no un ranking de
        peligro**: nearmiss solo publica el riesgo como una tasa con denominador, intervalo de confianza
        y una advertencia de sesgo, nunca como un conteo crudo etiquetado de "peligroso". **Esto NO
        envía a una cuadrilla municipal** — para un problema vial urgente, llame también a su ciudad
        (por ejemplo, al 311). Gracias por contribuir con cuidado.
