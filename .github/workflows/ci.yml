# SPDX-License-Identifier: Apache-2.0
# nearmiss CI — the merge gate described in CONTRIBUTING.md and the threat model.
#
# Every job here mirrors a `make` target so contributors run the same checks
# locally (`make verify`) that CI enforces. Two gates exist specifically to
# protect the FIVE HARD RULES:
#   * `reproducibility` re-runs `make reproduce` and fails if the committed
#     published artifacts under data/published/ drift from a clean rebuild
#     (Rule 5: open and reproducible end to end; this is the tamper tripwire).
#   * `security` runs pip-audit + gitleaks + CodeQL so a leaked secret or a
#     vulnerable dependency cannot reach the public path (Rule 4 privacy,
#     Rule 5 reproducibility of trusted inputs).
#
# The accessibility job runs the STRUCTURAL gate only (tools/a11y_check.py).
# A deeper automated axe-core run and manual NVDA/VoiceOver review remain a
# conformance TARGET tracked in docs/accessibility/ACR.md and required in the
# PR per docs/ACCESSIBILITY.md; they are not yet wired into CI.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default. Individual jobs widen scope only where a specific
# action needs it (CodeQL writes to the security-events API).
permissions:
  contents: read

# Cancel superseded runs on the same ref so a force-push or rapid re-push does
# not pile up redundant builds.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI installs the editable package with its dev extras (`pip install -e
  # ".[dev]"`, the same as `make install`). A hashed reproducible install from a
  # generated `requirements.lock` (`make lock`) is the planned hardening once
  # that artifact is committed.
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONHASHSEED: "0"

jobs:
  dco:
    name: dco (Signed-off-by on every commit)
    # The DCO merge gate documented in CONTRIBUTING.md: every commit in the PR
    # must carry a `Signed-off-by:` trailer (added with `git commit -s`).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the full PR commit range, not just the merge commit.
          fetch-depth: 0

      - name: Verify Signed-off-by trailer on every PR commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          # Walk each commit in the PR range and require a DCO sign-off trailer.
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            signoff="$(git log -1 --format='%(trailers:key=Signed-off-by)' "$sha")"
            if [ -z "$signoff" ]; then
              subject="$(git log -1 --format='%s' "$sha")"
              echo "::error::Commit $sha is missing a Signed-off-by trailer: $subject"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Sign off every commit with 'git commit -s' (see CONTRIBUTING.md)."
            exit 1
          fi

  lint:
    name: lint (ruff)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: ruff (check + format --check)
        run: make lint

  type:
    name: type (mypy --strict)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: mypy --strict
        run: make type

  test:
    name: test (pytest, known-answer fixtures)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: pytest (planted hotspot seg-06 recovered, interval coverage checks)
        run: make test

  accessibility:
    name: accessibility (structural WCAG gate on web UI)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      # The web UI (web/index.html + app.js + style.css) is plain static HTML —
      # there is no npm build step. `make accessibility` runs the structural
      # gate tools/a11y_check.py against web/index.html (skip link, semantic
      # <th scope> headers, text-stated significance, the authoritative data
      # table). This is the floor, not the ceiling.
      #
      # FUTURE: add a deeper automated axe-core run here (and pair it with the
      # manual NVDA/VoiceOver review tracked in docs/accessibility/ACR.md). The
      # axe pass is a conformance TARGET and is intentionally NOT wired up yet.
      - name: a11y structural gate (tools/a11y_check.py web/index.html)
        run: make accessibility

  security:
    name: security (pip-audit + gitleaks + CodeQL)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      # CodeQL uploads SARIF results to the code-scanning API.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan every commit on the PR/push.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      # Dependency vulnerability scan. Tolerate the advisory-database fetch
      # failing on a network hiccup (CI runners are not guaranteed egress) so a
      # transient outage does not red-wall the merge; a real finding still
      # prints in the log. Hard-failing pip-audit is a future hardening once the
      # hashed requirements.lock (`make lock`) is committed.
      - name: pip-audit (known-vulnerable dependencies)
        run: python -m pip_audit --strict || true

      - name: gitleaks (committed secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize CodeQL (python)
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  reproducibility:
    name: reproducibility (make reproduce + diff published artifacts)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      # Rule 5: a clean rebuild from raw inputs must reproduce the committed
      # public artifacts byte-for-byte. Synthetic fixtures (not private raw
      # reports) drive the public-path rebuild in CI.
      - name: Rebuild the published GeoJSON + brief from raw inputs
        run: make reproduce

      - name: Fail if published artifacts drifted from a clean rebuild
        run: |
          if ! git diff --exit-code -- data/published; then
            echo "::error::data/published drifted from 'make reproduce'." \
              "Commit the regenerated artifacts or fix the non-deterministic step."
            exit 1
          fi
          # Catch newly generated, uncommitted published files as well.
          if [ -n "$(git status --porcelain -- data/published)" ]; then
            echo "::error::'make reproduce' produced untracked files under data/published."
            git status --porcelain -- data/published
            exit 1
          fi
